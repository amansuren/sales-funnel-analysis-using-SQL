<svg width="100%" viewBox="0 0 680 510" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>E-commerce conversion funnel — 30-day period</title>
  <desc>Five-stage purchase funnel: 4,291 page views narrow to 709 purchases for a 17% overall conversion rate. Biggest drop is view to cart at 31%.</desc>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#C7CCEE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="510" fill="#FFFFFF" rx="0"/>

  <!-- Column header -->
  <text x="616" y="22" text-anchor="middle"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;font-weight:500;fill:#9CA3AF;letter-spacing:0.04em;">% OF TOTAL</text>
  <line x1="590" y1="29" x2="642" y2="29" stroke="#E5E7EB" stroke-width="0.75"/>

  <!-- ── Stage 1: Page View ── -->
  <rect x="80" y="38" width="500" height="52" rx="10"
    style="fill:#EEF0FD;stroke:#A5AEED;stroke-width:1;"/>
  <text x="330" y="59" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;font-weight:600;fill:#3730A3;">Page view</text>
  <text x="330" y="77" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;fill:#6366F1;">4,291 visitors</text>
  <text x="616" y="68" text-anchor="middle"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;fill:#6B7280;">100%</text>

  <!-- Connector 1 -->
  <line x1="330" y1="90" x2="330" y2="116" stroke="#D1D5DB" stroke-width="0.75"/>
  <!-- Gap pill 1: warning (biggest drop) -->
  <rect x="214" y="96" width="232" height="20" rx="10"
    style="fill:#FEF2F2;stroke:#FCA5A5;stroke-width:0.75;"/>
  <text x="330" y="106" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;fill:#EF4444;">⚠ 31% step rate — biggest drop</text>

  <!-- ── Stage 2: Add to Cart ── -->
  <rect x="140" y="116" width="380" height="52" rx="10"
    style="fill:#E0E7FF;stroke:#818CF8;stroke-width:1;"/>
  <text x="330" y="137" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;font-weight:600;fill:#3730A3;">Add to cart</text>
  <text x="330" y="155" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;fill:#6366F1;">1,338 users</text>
  <text x="616" y="149" text-anchor="middle"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;fill:#6B7280;">31%</text>

  <!-- Connector 2 -->
  <line x1="330" y1="168" x2="330" y2="194" stroke="#D1D5DB" stroke-width="0.75"/>
  <rect x="240" y="174" width="180" height="20" rx="10"
    style="fill:#F3F4F6;stroke:#D1D5DB;stroke-width:0.75;"/>
  <text x="330" y="184" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;fill:#9CA3AF;">71% step rate</text>

  <!-- ── Stage 3: Checkout Start ── -->
  <rect x="182" y="194" width="296" height="52" rx="10"
    style="fill:#C7D2FE;stroke:#6366F1;stroke-width:1;"/>
  <text x="330" y="215" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;font-weight:600;fill:#312E81;">Checkout start</text>
  <text x="330" y="233" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;fill:#4F46E5;">954 users</text>
  <text x="616" y="227" text-anchor="middle"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;fill:#6B7280;">22%</text>

  <!-- Connector 3 -->
  <line x1="330" y1="246" x2="330" y2="272" stroke="#D1D5DB" stroke-width="0.75"/>
  <rect x="240" y="252" width="180" height="20" rx="10"
    style="fill:#F3F4F6;stroke:#D1D5DB;stroke-width:0.75;"/>
  <text x="330" y="262" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;fill:#9CA3AF;">81% step rate</text>

  <!-- ── Stage 4: Payment Info ── -->
  <rect x="202" y="272" width="256" height="52" rx="10"
    style="fill:#A5B4FC;stroke:#4F46E5;stroke-width:1;"/>
  <text x="330" y="293" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;font-weight:600;fill:#1E1B4B;">Payment info</text>
  <text x="330" y="311" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;fill:#3730A3;">770 users</text>
  <text x="616" y="305" text-anchor="middle"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;fill:#6B7280;">18%</text>

  <!-- Connector 4 -->
  <line x1="330" y1="324" x2="330" y2="350" stroke="#D1D5DB" stroke-width="0.75"/>
  <rect x="240" y="330" width="180" height="20" rx="10"
    style="fill:#F3F4F6;stroke:#D1D5DB;stroke-width:0.75;"/>
  <text x="330" y="340" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;fill:#9CA3AF;">92% step rate</text>

  <!-- ── Stage 5: Purchase ── -->
  <rect x="216" y="350" width="228" height="52" rx="10"
    style="fill:#818CF8;stroke:#3730A3;stroke-width:1;"/>
  <text x="330" y="371" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13.5px;font-weight:600;fill:#FFFFFF;">Purchase</text>
  <text x="330" y="389" text-anchor="middle" dominant-baseline="central"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;fill:#E0E7FF;">709 buyers</text>
  <text x="616" y="383" text-anchor="middle"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;fill:#6B7280;">17%</text>

  <!-- Divider -->
  <line x1="80" y1="422" x2="580" y2="422" stroke="#E5E7EB" stroke-width="0.75"/>

  <!-- Footer summary -->
  <text x="330" y="444" text-anchor="middle"
    style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;fill:#9CA3AF;">17% overall conversion · 709 purchases · $76,191 revenue · $107 avg order</text>
</svg>
